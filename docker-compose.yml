services:
  lgtm:
    image: ${LGTM_IMAGE:-grafana/otel-lgtm:0.28.0}
    container_name: ${LGTM_CONTAINER_NAME:-codex-otel-lgtm}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
      - "127.0.0.1:${OTLP_GRPC_PORT:-4317}:4317"
      - "127.0.0.1:${OTLP_HTTP_PORT:-4318}:4318"
    environment:
      ENABLE_LOGS_OTELCOL: "1"
      ENABLE_LOGS_GRAFANA: "1"
    volumes:
      - codex-otel-lgtm-data:/data
      - ./observability/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - ./observability/provisioning/datasources/datasources.yml:/otel-lgtm/grafana/conf/provisioning/datasources/grafana-datasources.yaml:ro
      - ./observability/provisioning/dashboards/dashboards.yml:/otel-lgtm/grafana/conf/provisioning/dashboards/codex-dashboards.yaml:ro
      - ./observability/dashboards:/otel-lgtm/codex-dashboards:ro

volumes:
  codex-otel-lgtm-data:
    name: ${LGTM_DATA_VOLUME:-codex-otel-lgtm-data}
